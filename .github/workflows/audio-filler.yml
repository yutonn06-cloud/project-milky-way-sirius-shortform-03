name: Audio Filler

on:
  schedule:
    # 21:15 UTC = 06:15 Asia/Tokyo. Runs 15 min after the cloud rewrite routine
    # (06:00 JST) so the Notion page has its text written before we look for it.
    - cron: '15 21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'pending = fill empty 音声URL_A only (default). backfill_localhost = regenerate audio for any entry whose 音声URL_A still points at http://localhost:8765/...'
        required: true
        default: pending
        type: choice
        options:
          - pending
          - backfill_localhost

permissions:
  contents: write

concurrency:
  group: audio-filler
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run audio filler
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BACKFILL_LOCALHOST: ${{ github.event.inputs.mode == 'backfill_localhost' }}
        run: bash tools/audio-filler.sh
